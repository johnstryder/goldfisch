# Standalone PocketBase deployment for pb_goldfisch.iwishihadthis.com
# Deploy this as a separate Coolify application
version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - pb_migrations:/pb_migrations
    environment:
      - POCKETBASE_ENCRYPTION_KEY=${POCKETBASE_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pb_data:
  pb_migrations:
