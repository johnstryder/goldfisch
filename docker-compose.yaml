version: '3.8'

services:
  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.0
    container_name: dragonfly
    restart: unless-stopped
    # No port mapping - Redis is internal only; backend/pocketbase connect via Docker network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    # No port mapping - frontend proxies /pb/ to pocketbase internally
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
    environment:
      - POCKETBASE_ENCRYPTION_KEY=${POCKETBASE_ENCRYPTION_KEY:-your-secret-key-here}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Alpine image may not have curl; nc checks if port is listening
      test: ["CMD", "nc", "-z", "localhost", "8090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    # No port mapping - frontend proxies /api/ to backend internally
    environment:
      - NODE_ENV=production
      - PORT=8000
      - POCKETBASE_URL=http://pocketbase:8090
      - FRONTEND_URL=http://localhost:3000
      - DRAGONFLY_URL=redis://redis:6379
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://app.posthog.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@example.com}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-Tezzemplate}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALENDAR_REDIRECT_URI=${GOOGLE_CALENDAR_REDIRECT_URI:-}
    depends_on:
      pocketbase:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pb_data:
  pb_migrations:
  redis_data: